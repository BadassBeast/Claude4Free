<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus | Claude 4.6 (Puter)</title>

  <script src="https://js.puter.com/v2/"></script>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Fira+Code&display=swap" rel="stylesheet" />

  <style>
    :root { --sea-950: #020c1b; --indigo: #6366f1; }
    body { background: var(--sea-950); color: #e2e8f0; font-family: 'Manrope', sans-serif; height: 100vh; display: flex; overflow: hidden; }
    .glass { background: rgba(6,18,38,0.7); backdrop-filter: blur(20px); border: 1px solid rgba(99,102,241,0.2); }
    #chat-scroll { scrollbar-width: thin; scrollbar-color: rgba(99,102,241,0.3) transparent; }
    .user-msg { background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(139,92,246,0.1)); border: 1px solid rgba(99,102,241,0.3); border-radius: 15px 15px 2px 15px; }
    .ai-msg { background: rgba(9,24,52,0.6); border: 1px solid rgba(99,102,241,0.15); border-radius: 2px 15px 15px 15px; }
    .reasoning-trace { border-left: 2px solid #22d3ee; background: rgba(34,211,238,0.05); padding: 10px; margin-bottom: 10px; font-size: 0.85rem; color: #94a3b8; }
    .loading-pulse { animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  </style>
</head>
<body>

  <aside class="w-72 glass border-r border-white/5 flex flex-col p-6 hidden md:flex">
    <div class="mb-8">
      <h1 class="text-xl font-extrabold tracking-tighter text-white">Nexus <span class="text-indigo-400">Puter</span></h1>
      <p class="text-[10px] text-slate-500 font-mono mt-1">ENGINE: CLAUDE-SONNET-4-6</p>
    </div>

    <div class="space-y-6 flex-1">
      <div>
        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-3">Model Capabilities</label>
        <div class="space-y-2">
          <div class="flex items-center gap-2 text-xs text-emerald-400"><i class="fas fa-check-circle"></i> Vision Analysis</div>
          <div class="flex items-center gap-2 text-xs text-emerald-400"><i class="fas fa-check-circle"></i> Extended Thinking</div>
          <div class="flex items-center gap-2 text-xs text-emerald-400"><i class="fas fa-check-circle"></i> Puter.js Native</div>
        </div>
      </div>

      <div class="pt-4 border-t border-white/5">
        <div class="flex items-center justify-between mb-2">
          <span class="text-xs font-semibold">Reasoning Trace</span>
          <input type="checkbox" id="reasoning-toggle" class="w-4 h-4 accent-indigo-500" checked>
        </div>
        <p class="text-[10px] text-slate-500">Enable to see the model's internal chain of thought.</p>
      </div>
    </div>

    <button onclick="window.location.reload()" class="mt-auto w-full py-2 text-xs border border-red-500/30 text-red-400 rounded-lg hover:bg-red-500/10 transition">Reset Instance</button>
  </aside>

  <main class="flex-1 flex flex-col min-w-0 bg-slate-950/40">
    <header class="h-14 glass-sm border-b border-white/5 flex items-center justify-between px-6">
      <div class="flex items-center gap-2">
        <div class="w-2 h-2 bg-emerald-500 rounded-full loading-pulse"></div>
        <span class="text-xs font-mono text-slate-400">Status: Connected to Puter Cloud</span>
      </div>
    </header>

    <div id="chat-scroll" class="flex-1 overflow-y-auto p-6 space-y-6">
      <div id="welcome-ui" class="flex flex-col items-center justify-center h-full text-center opacity-50">
        <i class="fas fa-microchip text-4xl text-indigo-500 mb-4"></i>
        <h2 class="text-lg font-bold">Claude 4.6 Sonnet</h2>
        <p class="text-sm max-w-xs">Powered by Puter.js serverless infrastructure.</p>
      </div>
    </div>

    <div class="p-4 md:p-8">
      <div class="max-w-4xl mx-auto">
        <div id="img-preview" class="hidden mb-3 relative inline-block">
          <img id="preview-tag" class="h-16 w-16 rounded-lg border-2 border-indigo-500 object-cover">
          <button onclick="removeImg()" class="absolute -top-2 -right-2 bg-red-500 w-5 h-5 rounded-full text-[10px]"><i class="fas fa-times"></i></button>
        </div>

        <div class="glass p-2 rounded-2xl flex items-end gap-2 border border-white/10 shadow-2xl">
          <label class="p-3 text-slate-400 hover:text-indigo-400 cursor-pointer">
            <i class="fas fa-paperclip"></i>
            <input type="file" id="file-in" class="hidden" accept="image/*" onchange="handleFile(event)">
          </label>
          <textarea id="user-in" rows="1" placeholder="Type a message..." class="flex-1 bg-transparent border-none focus:ring-0 py-3 text-sm text-white resize-none"></textarea>
          <button onclick="send()" id="send-btn" class="bg-indigo-600 hover:bg-indigo-500 w-11 h-11 rounded-xl flex items-center justify-center transition-all">
            <i class="fas fa-chevron-up"></i>
          </button>
        </div>
      </div>
    </div>
  </main>

  <script>
    let currentImg = null;
    let isThinking = false;

    function handleFile(e) {
      const file = e.target.files[0];
      const reader = new FileReader();
      reader.onload = (ev) => {
        currentImg = ev.target.result;
        document.getElementById('preview-tag').src = currentImg;
        document.getElementById('img-preview').classList.remove('hidden');
      };
      reader.readAsDataURL(file);
    }

    function removeImg() {
      currentImg = null;
      document.getElementById('img-preview').classList.add('hidden');
    }

    async function send() {
      const input = document.getElementById('user-in');
      const text = input.value.trim();
      if ((!text && !currentImg) || isThinking) return;

      document.getElementById('welcome-ui').classList.add('hidden');
      renderMsg('User', text, currentImg);
      
      input.value = '';
      const b64 = currentImg; // Capture for the request
      removeImg();
      
      const botId = 'ai-' + Date.now();
      renderMsg('Claude', '...', null, botId);
      const botBody = document.getElementById(botId).querySelector('.content-slot');
      
      isThinking = true;
      let fullResponse = '';

      try {
        // Construct message for Puter.js
        let chatParams = {
          model: 'claude-sonnet-4-6',
          stream: true
        };

        // Puter handles multi-modal via the first argument or content array
        const prompt = b64 ? [text || "Describe this image", b64] : text;

        const response = await puter.ai.chat(prompt, chatParams);

        botBody.innerHTML = ''; // Clear the "..."

        for await (const part of response) {
            // Handle reasoning if present in the chunk metadata
            if (part.reasoning && document.getElementById('reasoning-toggle').checked) {
                let rBox = document.getElementById(botId).querySelector('.reasoning-slot');
                if (!rBox) {
                    rBox = document.createElement('div');
                    rBox.className = 'reasoning-trace';
                    botBody.before(rBox);
                }
                rBox.innerText += part.reasoning;
            }

            if (part.text) {
                fullResponse += part.text;
                botBody.innerHTML = marked.parse(fullResponse);
            }
        }
      } catch (err) {
        botBody.innerHTML = `<span class="text-red-400">Error: ${err.message}</span>`;
      } finally {
        isThinking = false;
        document.getElementById('chat-scroll').scrollTop = document.getElementById('chat-scroll').scrollHeight;
      }
    }

    function renderMsg(sender, text, img, id) {
      const container = document.getElementById('chat-scroll');
      const div = document.createElement('div');
      div.id = id || '';
      const isUser = sender === 'User';
      
      div.className = `flex ${isUser ? 'justify-end' : 'justify-start'} w-full`;
      div.innerHTML = `
        <div class="max-w-[85%] ${isUser ? 'user-msg' : 'ai-msg'} p-4 shadow-lg">
          <p class="text-[9px] font-bold text-slate-500 uppercase mb-2">${sender}</p>
          ${img ? `<img src="${img}" class="max-h-60 rounded-lg mb-3 border border-white/10">` : ''}
          <div class="content-slot text-sm leading-relaxed">${text ? marked.parse(text) : ''}</div>
        </div>
      `;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    // Auto-resize textarea
    document.getElementById('user-in').addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = (this.scrollHeight) + 'px';
    });
  </script>
</body>
</html>
